services:
  test-db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: lightningrod_test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: lightningrod_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightningrod_test -d lightningrod_test"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
