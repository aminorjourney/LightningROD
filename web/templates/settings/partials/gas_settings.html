{% if saved %}
<div class="alert alert-success text-sm mb-3">Settings saved.</div>
{% endif %}

<!-- Display Toggle Options -->
<h3 class="text-sm font-semibold mb-3">Display Options</h3>
<form hx-post="/settings/toggles" hx-target="#gas-settings" hx-swap="innerHTML"
      class="space-y-2">
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_section_visible"
               {% if settings.comparison_section_visible == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Show comparison section</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_gas_enabled"
               {% if settings.comparison_gas_enabled == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Gasoline comparison</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_network_enabled"
               {% if settings.comparison_network_enabled == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Network rate comparison</span>
    </label>
    <div class="pt-1">
        <button type="submit" class="btn btn-primary btn-sm">
            Save
        </button>
    </div>
</form>

<!-- Gas Price History (lazy-loaded) -->
<div hx-get="/settings/gas-prices" hx-trigger="load" hx-swap="innerHTML"
     class="mt-6" id="gas-price-history-section">
    <span class="loading loading-spinner loading-sm"></span>
</div>
